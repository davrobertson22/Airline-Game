<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <!-- Sky gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2b5e;stop-opacity:1" />
    </linearGradient>
    <!-- Wing gradient -->
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8d8f0;stop-opacity:1" />
    </linearGradient>
    <!-- Gold gradient for accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0b429;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8d06b;stop-opacity:1" />
    </linearGradient>
    <!-- Swoosh gradient -->
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#60a5fa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="600" height="220" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Tailwind swoosh lines (behind plane) -->
  <path d="M 20 105 Q 100 90 180 100" stroke="url(#swooshGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 10 115 Q 110 100 190 112" stroke="url(#swooshGrad)" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 30 125 Q 105 115 185 122" stroke="url(#swooshGrad)" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Airplane group, centered left side -->
  <g transform="translate(195, 58) scale(1.1)" filter="url(#glow)">
    <!-- Fuselage -->
    <ellipse cx="55" cy="50" rx="55" ry="11" fill="url(#wingGrad)" />
    <!-- Nose cone -->
    <path d="M 108 50 Q 125 50 130 50 Q 125 47 108 44 Z" fill="white"/>
    <!-- Tail fin -->
    <path d="M 2 50 L 0 30 L 18 44 Z" fill="#c8d8f0"/>
    <!-- Tail stabilizers -->
    <path d="M 5 52 L 0 65 L 20 56 Z" fill="#c8d8f0"/>
    <!-- Main wings -->
    <path d="M 60 50 L 35 18 L 25 18 L 45 50 Z" fill="url(#wingGrad)"/>
    <path d="M 60 50 L 35 82 L 25 82 L 45 50 Z" fill="url(#wingGrad)" opacity="0.8"/>
    <!-- Engine pod -->
    <ellipse cx="42" cy="24" rx="9" ry="4" fill="#a0b4cc"/>
    <ellipse cx="42" cy="76" rx="9" ry="4" fill="#a0b4cc" opacity="0.8"/>
    <!-- Window row -->
    <circle cx="90" cy="47" r="2.8" fill="#7dd3fc" opacity="0.9"/>
    <circle cx="80" cy="47" r="2.8" fill="#7dd3fc" opacity="0.9"/>
    <circle cx="70" cy="47" r="2.8" fill="#7dd3fc" opacity="0.9"/>
    <circle cx="60" cy="47" r="2.8" fill="#7dd3fc" opacity="0.9"/>
  </g>

  <!-- Gold accent line under icon -->
  <rect x="195" y="162" width="145" height="3" rx="1.5" fill="url(#goldGrad)" opacity="0.85"/>

  <!-- TAILWINDS text -->
  <text x="360" y="108"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="54"
    font-weight="900"
    letter-spacing="2"
    fill="white"
    text-anchor="start">TAILWINDS</text>

  <!-- Divider line -->
  <rect x="360" y="118" width="218" height="2.5" rx="1.25" fill="url(#goldGrad)" opacity="0.9"/>

  <!-- Subtitle -->
  <text x="362" y="148"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="16.5"
    font-weight="400"
    letter-spacing="6"
    fill="#93c5fd"
    text-anchor="start">AIRLINE MANAGER</text>

  <!-- Stars / dots for atmosphere -->
  <circle cx="50" cy="25" r="1" fill="white" opacity="0.4"/>
  <circle cx="120" cy="15" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="80" cy="190" r="1" fill="white" opacity="0.25"/>
  <circle cx="560" cy="20" r="1.2" fill="white" opacity="0.35"/>
  <circle cx="540" cy="185" r="0.8" fill="white" opacity="0.2"/>
  <circle cx="30" cy="170" r="0.9" fill="white" opacity="0.3"/>
</svg>
